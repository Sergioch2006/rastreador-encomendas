networks:
  logistics-net:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  rabbitmq-data:


services:

  # === INFRAESTRUTURA ===

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: logistics-sqlserver
    environment:
      SA_PASSWORD: "Encomendas2026"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - logistics-net
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Encomendas2026", "-Q", "SELECT 1", "-b", "-C" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # === AuthAPI Service ===
  logistics-auth-api:
    build:
      context: .
      dockerfile: GlobalLogistics.AuthAPI/Dockerfile
    container_name: logistics-auth-api
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__AuthDb=Server=sqlserver,1433;Database=LogisticsAuth;User Id=sa;Password=Encomendas2026;TrustServerCertificate=True;
      - Jwt__Issuer=GlobalLogistics.AuthAPI
      - Jwt__Audience=GlobalLogistics.API
      - Jwt__SigningKey=${JWT_SIGNING_KEY:-HeAwCqSEvdyn8GSuDXYXZhygQ0htwqz2vGbQ/5P9giU=}
      - Jwt__TokenExpirationMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - logistics-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    command: redis-server --requirepass Redis@2026!
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - logistics-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "Redis@2026!", "ping" ]
      interval: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logistics-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: logistics_user
      RABBITMQ_DEFAULT_PASS: "Rabbit@2026!"
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - logistics-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      retries: 10
      start_period: 30s

  # === MICROSERVIÇOS ===

  ingestion-api:
    build:
      context: .
      dockerfile: GlobalLogistics.IngestionAPI/Dockerfile
    container_name: logistics-ingestion-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SqlServer=Server=sqlserver,1433;Database=LogisticsWrite;User Id=sa;Password=Encomendas2026;TrustServerCertificate=true;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__User=logistics_user
      - RabbitMQ__Pass=Rabbit@2026!
      - RabbitMQ__ConnectionString=amqp://logistics_user:Rabbit%402026!@rabbitmq:5672
      - Auth__JwtIssuer=GlobalLogistics.AuthAPI
      - Auth__JwtAudience=GlobalLogistics.API
      - Auth__JwtSigningKey=${JWT_SIGNING_KEY:-HeAwCqSEvdyn8GSuDXYXZhygQ0htwqz2vGbQ/5P9giU=}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logistics-auth-api:
        condition: service_healthy
    networks:
      - logistics-net

  query-api:
    build:
      context: .
      dockerfile: GlobalLogistics.QueryAPI/Dockerfile
    container_name: logistics-query-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SqlServer=Server=sqlserver,1433;Database=LogisticsWrite;User Id=sa;Password=Encomendas2026;TrustServerCertificate=true;
      - Redis__ConnectionString=redis:6379,password=Redis@2026!
      - Auth__JwtIssuer=GlobalLogistics.AuthAPI
      - Auth__JwtAudience=GlobalLogistics.API
      - Auth__JwtSigningKey=${JWT_SIGNING_KEY:-HeAwCqSEvdyn8GSuDXYXZhygQ0htwqz2vGbQ/5P9giU=}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      logistics-auth-api:
        condition: service_healthy
    networks:
      - logistics-net

  worker:
    build:
      context: .
      dockerfile: GlobalLogistics.Worker/Dockerfile
    container_name: logistics-worker
    environment:
      - ConnectionStrings__SqlServer=Server=sqlserver,1433;Database=LogisticsWrite;User Id=sa;Password=Encomendas2026;TrustServerCertificate=true;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__User=logistics_user
      - RabbitMQ__Pass=Rabbit@2026!
      - Redis__ConnectionString=redis:6379,password=Redis@2026!
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logistics-net
